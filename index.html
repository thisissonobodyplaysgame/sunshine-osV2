<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunshine OS</title> 

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: white;
    cursor: none;
    background: url('https://4kwallpapers.com/images/walls/thumbs_3t/22088.jpg') no-repeat center center fixed;
    background-size: cover;
}

#startup {
    position: fixed;
    inset: 0;
    background: linear-gradient(to top, #1a001f, #ff5e62, #ff9966);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 200000;
}

.sun {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle, #ffd27f, #ff7e5f);
    box-shadow: 0 0 60px rgba(255,150,100,0.8);
    animation: sunRise 2.5s ease forwards;
}

.start-text {
    margin-top: 30px;
    font-size: 28px;
    letter-spacing: 4px;
    opacity: 0;
    animation: fadeInText 1.5s ease forwards;
    animation-delay: 0.8s;
}

.enter-btn {
    margin-top: 40px;
    padding: 12px 28px;
    border-radius: 999px;
    border: none;
    font-size: 14px;
    letter-spacing: 2px;
    background: rgba(255,255,255,0.15);
    color: white;
    backdrop-filter: blur(10px);
    opacity: 0;
    animation: fadeInText 1.5s ease forwards;
    animation-delay: 1.6s;
}

@keyframes sunRise { from { transform: translateY(200px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes fadeInText { to { opacity: 1; } }
@keyframes fadeOutStartup { to { opacity: 0; visibility: hidden; } }

#cursor {
    width: 14px;
    height: 14px;
    background: white;
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 300000;
    transform: translate(-50%, -50%);
}

.time { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 96px; }
.day { position: absolute; top: 62%; left: 50%; transform: translateX(-50%); font-size: 20px; }

.dock {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 14px;
    padding: 10px 14px;
    border-radius: 14px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
}

.app {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background-size: cover;
    background-position: center;
    background-color: rgba(255,255,255,0.1);
    transition: 0.2s ease;
    cursor: pointer;
}

.library-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background-color: rgba(255,255,255,0.1);
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: 0.2s ease;
}

.library-icon img { width: 24px; height: 24px; }
.app:hover, .library-icon:hover { transform: scale(1.15); }

.fullscreen-app { position: fixed; inset: 0; background: black; display: none; z-index: 100000; }
.fullscreen-app.show { display: block; }
.fullscreen-app iframe { width: 100%; height: 100%; border: none; }

.close-btn {
    position: absolute;
    top: 12px;
    right: 14px;
    z-index: 10;
    background: rgba(0,0,0,0.6);
    border: none;
    color: white;
    padding: 8px 12px;
    border-radius: 10px;
    cursor: pointer;
}

.app-library {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(20px);
    display: none;
    z-index: 150000;
    padding: 40px;
}

.app-library.show { display: block; }

.library-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(80px,1fr));
    gap: 20px;
    margin-top: 40px;
}

.library-app {
    width: 70px;
    height: 70px;
    border-radius: 14px;
    background-size: cover;
    background-position: center;
    cursor: pointer;
}


.bg-preview {
    width: 120px;
    height: 80px;
    border-radius: 12px;
    background-size: cover;
    background-position: center;
    cursor: pointer;
    border: 2px solid rgba(255,255,255,0.2);
    transition: transform 0.2s, border-color 0.2s;
}
.bg-preview:hover { transform: scale(1.1); border-color: white; }
.setting-item { margin-bottom: 30px; }
.setting-item label { font-size: 18px; display: block; margin-bottom: 10px; }
</style>
</head>

    <div class="sun"></div>
    <div class="start-text">SUNSHINE OS</div>
    <button class="enter-btn" onclick="enterOS()">ENTER</button>

        title: "Home | Schoology",
        icon: "https://asset-cdn.schoology.com/sites/all/themes/schoology_theme/favicon.ico"
    }
};


function applyCloak(type){
    const cloak = cloaks[type];
    if(!cloak) return;


    document.title = cloak.title;


    const oldIcon = document.querySelector("link[rel='icon']");
    if(oldIcon) oldIcon.remove();


    if(cloak.icon){
        const link = document.createElement("link");
        link.rel = "icon";
        link.href = cloak.icon;
        document.head.appendChild(link);
    }

    currentCloak = type;
}


document.getElementById("tabCloak").addEventListener("change", e=>{
    applyCloak(e.target.value);
});


applyCloak("default");


document.querySelectorAll(".bg-preview").forEach(preview=>{
    preview.onclick = () => { document.body.style.backgroundImage = `url(${preview.dataset.bg})`; };
});


function openApp(id){
    const win=document.getElementById(id);
    if(win) win.classList.add('show');


    if(cloaks[id]){
        document.title = cloaks[id].title;
        const link = document.querySelector("link[rel~='icon']") || document.createElement('link');
        link.rel = 'icon';
        link.href = cloaks[id].icon;
        document.getElementsByTagName('head')[0].appendChild(link);
    }
}
</script>

</body>
</html>
