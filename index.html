<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunshine OS</title>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    font-family:Arial,sans-serif;
    color:#fff;
    cursor:none;
    background:url('https://4kwallpapers.com/images/walls/thumbs_3t/22088.jpg') no-repeat center center fixed;
    background-size:cover;
}

#startup{
    position:fixed;
    inset:0;
    background:linear-gradient(to top,#1a001f,#ff5e62,#ff9966);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:200000;
}

.sun{
    width:120px;
    height:120px;
    border-radius:50%;
    background:radial-gradient(circle,#ffd27f,#ff7e5f);
    box-shadow:0 0 60px rgba(255,150,100,.8);
    animation:sunRise 2.5s ease forwards;
}

.start-text{
    margin-top:30px;
    font-size:28px;
    letter-spacing:4px;
    opacity:0;
    animation:fadeInText 1.5s ease forwards .8s;
}

.enter-btn{
    margin-top:40px;
    padding:12px 28px;
    border-radius:999px;
    border:none;
    font-size:14px;
    letter-spacing:2px;
    background:rgba(255,255,255,.15);
    color:#fff;
    opacity:0;
    animation:fadeInText 1.5s ease forwards 1.6s;
}

@keyframes sunRise{from{transform:translateY(200px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeInText{to{opacity:1}}
@keyframes fadeOutStartup{to{opacity:0;visibility:hidden}}

#cursor{
    width:14px;
    height:14px;
    background:#fff;
    border-radius:50%;
    position:fixed;
    pointer-events:none;
    z-index:300000;
    transform:translate(-50%,-50%);
}

.time{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:96px;
}

.day{
    position:absolute;
    top:62%;
    left:50%;
    transform:translateX(-50%);
    font-size:20px;
}

.dock{
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:14px;
    padding:10px 14px;
    border-radius:14px;
    background:rgba(0,0,0,.6);
}

.app,.library-icon{
    width:40px;
    height:40px;
    border-radius:10px;
    background-size:cover;
    background-position:center;
    cursor:pointer;
    transition:.15s ease;
}

.app:hover,.library-icon:hover{transform:scale(1.1)}

.library-icon{
    display:flex;
    align-items:center;
    justify-content:center;
}

.library-icon img{width:24px;height:24px}

.fullscreen-app{
    position:fixed;
    inset:0;
    background:#000;
    display:none;
    z-index:100000;
}

.fullscreen-app.show{display:block}

.fullscreen-app iframe{
    width:100%;
    height:100%;
    border:none;
}

.close-btn{
    position:absolute;
    top:12px;
    right:14px;
    z-index:999999;
    background:rgba(0,0,0,.7);
    border:none;
    color:#fff;
    padding:8px 12px;
    border-radius:10px;
    cursor:pointer;
}

.app-library{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    backdrop-filter:blur(20px);
    display:none;
    z-index:150000;
    padding:40px;
}

.app-library.show{display:block}

.library-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(80px,1fr));
    gap:20px;
    margin-top:40px;
}

.library-app{
    width:70px;
    height:70px;
    border-radius:14px;
    background-size:cover;
    background-position:center;
    cursor:pointer;
}

.settings-box{
    padding:40px;
    font-size:18px;
}

.setting-title{
    font-size:34px;
    margin-bottom:20px;
}

.bg-preview{
    width:120px;
    height:80px;
    border-radius:12px;
    background-size:cover;
    background-position:center;
    cursor:pointer;
    border:2px solid rgba(255,255,255,.2);
}
</style>
</head>

function enterOS(){
    const s=document.getElementById("startup");
    s.style.animation="fadeOutStartup 1s forwards";
    setTimeout(()=>s.style.display="none",1000);
}

const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
    cursor.style.left=e.clientX+"px";
    cursor.style.top=e.clientY+"px";
},{passive:true});

function updateTime(){
    const now=new Date();
    document.getElementById("time").textContent=
        now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    document.getElementById("day").textContent=
        now.toLocaleDateString([], {weekday:'long'}).toUpperCase();
}
setInterval(updateTime,1000);
updateTime();

function closeAll(){
    document.querySelectorAll(".fullscreen-app").forEach(a=>a.classList.remove("show"));
}

document.querySelectorAll(".app").forEach(app=>{
    app.onclick=()=>{
        const id=app.dataset.app;
        closeAll();
        document.getElementById(id)?.classList.add("show");
    };
});

document.querySelectorAll(".close-btn").forEach(btn=>{
    btn.onclick=()=>btn.closest(".fullscreen-app,.app-library")?.classList.remove("show");
});

function renderLibrary(){
    libraryGrid.innerHTML="";
    apps.forEach(a=>{
        const div=document.createElement("div");
        div.className="library-app";
        div.style.backgroundImage=`url(${a.icon})`;
        div.onclick=()=>{
            library.classList.remove("show");
            closeAll();
            document.getElementById(a.id)?.classList.add("show");
        };
        libraryGrid.appendChild(div);
    });
}

renderLibrary();

document.getElementById("openLibrary").onclick=()=>library.classList.add("show");

document.querySelectorAll(".bg-preview").forEach(b=>{
    b.onclick=()=>document.body.style.backgroundImage=`url(${b.dataset.bg})`;
});

</script>
